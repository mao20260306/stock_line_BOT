name: Sync CSV from OneDrive

on:
  schedule:
    - cron: '0 0 * * *'  # 毎日日本時間の午前9時（UTC 0:00）に自動実行
  workflow_dispatch:      # 手動実行ボタン

jobs:
  download-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write    # リポジトリへの書き込み権限を許可

    steps:
      # 【修正ポイント】@v4 から Node.js 24に対応した @v4.2.2 に変更
      - name: Checkout Repository
        uses: actions/checkout@v4.2.2

      - name: Download CSV from OneDrive
        run: |
          # あなたのOneDrive直リンクURL
          curl -L -o "99_GitHubデータ.csv" "https://1drv.ms/x/c/3f519678d973895d/IQQVbSuGoyjDRoCYY47z9PUFAZ_y0C9vlht631tyHNR6JI8?download=1"

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add "99_GitHubデータ.csv"
          
          if ! git diff --cached --exit-code; then
            git commit -m "Auto-update: 99_GitHubデータ.csv from OneDrive"
            git push
          else
            echo "CSVファイルに変更はありませんでした。"
          fi
