name: stock notify

on:
  workflow_dispatch:
  schedule:
    - cron: '40 6 * * *'  # 毎日 6:40 に実行

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.10

      - run: pip install requests pandas yfinance

      - name: Run stock LINE bot
        run: python stock_Messaging.py
        env:
          LINE_TOKEN: ${{ secrets.LINE_TOKEN }}
          USER_ID: ${{ secrets.LINE_USERID }}
