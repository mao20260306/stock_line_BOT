name: stock notify

on:
  workflow_dispatch:
  schedule:
    - cron: '40 6 * * *'  # 毎日日本時間15:40（UTC 6:40）に実行

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Download CSV from OneDrive
        run: |
          curl -L -o "99_GitHubデータ.csv" "https://1drv.ms/x/c/3f519678d973895d/IQQVbSuGoyjDRoCYY47z9PUFAZ_y0C9vlht631tyHNR6JI8?download=1"

      # 【修正ポイント】警告の出る actions/setup-python を使わず、Ubuntu標準のpythonをそのまま使う
      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install requests pandas yfinance jpholiday

      - name: Run stock LINE bot
        run: python3 stock_Messaging.py
        env:
          LINE_TOKEN: ${{ secrets.LINE_TOKEN }}
          USER_ID: ${{ secrets.LINE_USERID }}
