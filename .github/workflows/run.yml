name: stock notify

on:
  workflow_dispatch:
  schedule:
    - cron: '40 6 * * *'  # 毎日日本時間15:40（UTC 6:40）に実行

jobs:
  run:
    runs-on: ubuntu-latest
    
    # 2026年のNode.js 24強制移行警告を回避する環境変数
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      # 警告対策として v3 から 最新の v5 に変更
      - uses: actions/checkout@v5

      # 警告対策として v4 から 最新の v5 に変更
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # 【修正】jpholiday を追加してインストール
      - run: pip install requests pandas yfinance jpholiday

      - name: Run stock LINE bot
        run: python stock_Messaging.py
        env:
          LINE_TOKEN: ${{ secrets.LINE_TOKEN }}
          USER_ID: ${{ secrets.LINE_USERID }}
