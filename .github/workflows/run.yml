name: stock notify

on:
  schedule:
    - cron: '40 6 * * *'

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: setup python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - run: pip install requests

      - run: python stock_notify.py
