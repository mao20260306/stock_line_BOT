name: stock_notify

on:
  workflow_dispatch:
  schedule:
    - cron: '40 6 * * *'  # 毎日6:40に実行

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: setup python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: install libraries
        run: pip install requests pandas yfinance

      - name: download CSV from OneDrive
        run: |
          python download_onedrive_csv.py
        env:
          ONEDRIVE_URL: ${{ secrets.ONEDRIVE_URL }}

      - name: run stock LINE bot
        run: python stock_line_bot.py
        env:
          LINE_TOKEN: ${{ secrets.LINE_TOKEN }}
          USER_ID: ${{ secrets.LINE_USERID }}
